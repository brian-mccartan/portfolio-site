<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mccartan.bros - New Single</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .album-artwork {
            width: 280px;
            height: 280px;
            margin: 0 auto 40px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out 0.1s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .album-artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideUp 0.8s ease-out 0.2s both;
        }

        .release-date {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 32px;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: slideUp 0.8s ease-out 0.3s both;
        }

        .artist-info {
            margin-bottom: 36px;
            animation: slideUp 0.8s ease-out 0.4s both;
        }

        .artist-name {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .genre-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 16px;
        }

        .tag {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid rgba(148, 163, 184, 0.4);
            border-radius: 20px;
            font-size: 12px;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .sounds-like {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 16px;
            line-height: 1.5;
        }

        .sounds-like strong {
            color: #cbd5e1;
        }

        .divider {
            height: 1px;
            background: rgba(148, 163, 184, 0.2);
            margin: 32px 0;
            animation: slideUp 0.8s ease-out 0.5s both;
        }

        .streaming-section {
            animation: slideUp 0.8s ease-out 0.6s both;
        }

        .streaming-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: block;
        }

        .streaming-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .stream-btn {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid rgba(148, 163, 184, 0.4);
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .stream-btn:hover {
            background: rgba(100, 116, 139, 0.6);
            border-color: rgba(148, 163, 184, 0.8);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .stream-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .footer {
            font-size: 12px;
            color: #64748b;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            line-height: 1.6;
            animation: slideUp 0.8s ease-out 0.7s both;
        }

        .footer a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #cbd5e1;
        }

        @media (max-width: 480px) {
            .container {
                padding: 36px 24px;
            }

            h1 {
                font-size: 26px;
            }

            .album-artwork {
                width: 240px;
                height: 240px;
            }

            .stream-btn {
                width: 50px;
                height: 50px;
            }

            .stream-btn svg {
                width: 28px;
                height: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="album-artwork">
            <img src="./Super_Little_Doggy.jpg" alt="Album artwork for mccartan.bros new single" id="albumImg">
        </div>

        <p><h1>New Single:</h1></p> 
        <h1>Super Little Doggy</h1>
        <div class="release-date">Coming June 30, 2026</div>

            <div class="sounds-like">

                Super Furry Animals, Beck, Beta Band

        <div class="streaming-section">

            </div>
        </div>

        <div class="footer">
            <strong>mccartan.bros</strong><br>
            Composed by Brian McCartan, Eoghan McCartan & Sé McCartan<br>

        </div>
    </div>
</body>
</html>
